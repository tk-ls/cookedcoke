<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Discount Code · Cooked Coke Co.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥤</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0B0B;
      --surface: #141414;
      --border: #2C2C2C;
      --text: #FFFFFF;
      --text-muted: #A0A0A0;
      --accent: #E8001C;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV ─── */
    nav {
      background: rgba(11, 11, 11, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .card {
      border: 1px solid var(--border);
      background: var(--surface);
      max-width: 500px;
      width: 100%;
      padding: 3rem;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .card-tag {
      display: inline-block;
      align-self: flex-start;
      padding: 0.25rem 0.75rem;
      background: rgba(232, 0, 28, 0.1);
      color: var(--accent);
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-title {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      white-space: nowrap;
    }

    .card-sub {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    /* ─── CODE BOX ─── */
    .code-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .code-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .code-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      background: var(--bg);
      gap: 1rem;
    }
    .code-text {
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      user-select: all;
    }
    .copy-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .copy-btn:hover { opacity: 0.9; }
    .copy-btn.copied { background: #00B140; color: white; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }
    .footer-text {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .card-title { white-space: normal; }
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Cooked Coke Co.</a>
</nav>

<main>
  <div class="card">
    <span class="card-tag">Voter Reward</span>
    <h1 class="card-title">You get 10% off.</h1>
    <p class="card-sub">
      Tell us this code when you buy and we'll take 10% off everything. One use per person.
    </p>

    <div class="code-wrap">
      <p class="code-label">Your unique code</p>
      <div class="code-box">
        <span class="code-text" id="code">......</span>
        <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <p class="footer-text">cookedcoke.xyz · Reddam House North Shore</p>
</footer>

<script>
  // RULE: First Digit + Last Digit = 10
  function generateCode() {
    const first = Math.floor(Math.random() * 9) + 1; // 1-9
    const last = 10 - first;
    
    let middle = '';
    for (let i = 0; i < 4; i++) {
      middle += Math.floor(Math.random() * 10);
    }
    
    return first.toString() + middle + last.toString();
  }

  // Initialize code on load
  let secretCode = localStorage.getItem('voterCode');
  if (!secretCode) {
    secretCode = generateCode();
    localStorage.setItem('voterCode', secretCode);
  }
  document.getElementById('code').textContent = secretCode;

  function copyCode() {
    const code = document.getElementById('code').textContent;
    const btn = document.getElementById('copyBtn');
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
